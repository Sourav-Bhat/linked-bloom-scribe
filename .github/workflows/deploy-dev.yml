name: Deploy to Firebase (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

concurrency:
  group: firebase-deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin Node 20 LTS — firebase-tools' bundled deps misbehave on newer Node majors.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install web app dependencies
        run: npm ci

      - name: Write dev env
        run: |
          cat > .env.development <<EOF
          VITE_APP_ENV=development
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY_DEV }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN_DEV }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID_DEV }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET_DEV }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_DEV }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID_DEV }}
          VITE_CLOUD_FUNCTIONS_BASE_URL=${{ secrets.VITE_CLOUD_FUNCTIONS_BASE_URL_DEV }}
          EOF

      - name: Build web app (development mode)
        run: npm run build -- --mode development

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}

      - name: Deploy to Firebase dev project (Hosting + Functions + Firestore/Storage rules)
        # No FUNCTIONS_SERVICE_ACCOUNT set: dev functions run as the dev project's
        # default runtime service account, which needs roles/aiplatform.user granted once.
        run: npx firebase-tools@15.22.0 deploy --project ${{ secrets.VITE_FIREBASE_PROJECT_ID_DEV }} --non-interactive --force
