name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: firebase-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # firebase-tools' bundled networking deps have known issues on very new
      # Node majors (see project history) — pin to Node 20 LTS for CI stability.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install web app dependencies
        run: npm ci

      - name: Write frontend .env
        run: |
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CLOUD_FUNCTIONS_BASE_URL=${{ secrets.VITE_CLOUD_FUNCTIONS_BASE_URL }}
          EOF

      - name: Build web app
        run: npm run build

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase (Hosting + Functions + Firestore/Storage rules)
        # --force lets the non-interactive deploy auto-create the Artifact Registry
        # cleanup policy for function images instead of prompting for it.
        run: npx firebase-tools@15.22.0 deploy --project contentmanager-ed707 --non-interactive --force
